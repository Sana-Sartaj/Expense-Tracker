

# ================================================================
#  Expense Tracker — full stack
#  Usage: docker compose up --build
# ================================================================

services:

  # ── Infrastructure ──────────────────────────────────────────────

  mysql:
    image: mysql:8.3.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 240s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr,mntr"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka
    restart: on-failure
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  kafka-init:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic user_service --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic expense_service --replication-factor 1 --partitions 1
        echo "Kafka topics ready."
    restart: "no"

  # ── Microservices ────────────────────────────────────────────────

  authservice:
    build:
      context: ./authservice-master
      dockerfile: Dockerfile
    image: auth-service
    container_name: auth-service
    restart: on-failure
    ports:
      - '9898:9898'
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: authservice
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9898/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 180s

  userservice:
    build:
      context: ./userservice-master
      dockerfile: Dockerfile
    image: user-service
    container_name: user-service
    restart: on-failure
    ports:
      - '9810:9810'
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: userservice
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      authservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9810/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 180s

  expenseservice:
    build:
      context: ./expenseService-main
      dockerfile: Dockerfile
    image: expense-service
    container_name: expense-service
    restart: on-failure
    ports:
      - '9820:9820'
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: expenseservice
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9820/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 180s

  dsservice:
    build:
      context: ./dsService-main
      dockerfile: Dockerfile
    image: ds-service
    container_name: ds-service
    restart: on-failure
    ports:
      - '8010:8010'
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      expenseservice:
        condition: service_healthy
      userservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── API Gateway ──────────────────────────────────────────────────

  kong:
    build:
      context: ./expenseTrackerAppDeps-main/kong
      dockerfile: Dockerfile
    image: kong-custom
    container_name: kong
    ports:
      - "8000:8000"
      - "8443:8443"
      - "127.0.0.1:8001:8001"
      - "127.0.0.1:8444:8444"
    depends_on:
      authservice:
        condition: service_healthy
      userservice:
        condition: service_healthy
      expenseservice:
        condition: service_healthy
      dsservice:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  mysql-data:
    driver: local
